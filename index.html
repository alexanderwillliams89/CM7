<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Pose Camera Pro - Premium</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: 'Arial', sans-serif;
}

/* Camera */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.95);
}

/* Dark overlay for better visibility */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.15);
  pointer-events: none;
  z-index: 2;
}

/* Pose frame guide */
#frame {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 65%;
  height: 75%;
  border: 4px dashed rgba(255, 255, 255, 0.8);
  border-radius: 30px;
  z-index: 5;
  box-shadow: 0 0 30px rgba(255, 255, 255, 0.3) inset;
  background: rgba(0, 255, 100, 0.05);
}

/* Corner guide with pose image - NO BLANK SPACE */
#cornerGuide {
  position: fixed;
  bottom: 120px;
  right: 20px;
  width: 160px;
  height: 200px;
  border: 3px solid #00ff88;
  border-radius: 15px;
  background: black;
  z-index: 15;
  box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Pose image container - FULL HEIGHT */
#slideshowContainer {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: black;
  position: relative;
}

#slideshow {
  width: 100%;
  height: 100%;
  position: relative;
}

#slideshow img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Transparent silhouette overlay on camera */
#silhouetteOverlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 65%;
  height: 75%;
  z-index: 8;
  pointer-events: none;
  border-radius: 30px;
  overflow: hidden;
  opacity: 0.3;
}

#silhouetteOverlay img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) brightness(1.5) invert(1);
}

/* Controls */
.controls {
  position: fixed;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 15px;
  z-index: 20;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  font-weight: bold;
  background: linear-gradient(135deg, #00ff88, #00cc66);
  color: #000;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
  transition: all 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0, 255, 136, 0.6);
}

button:active {
  transform: scale(0.95);
}

/* Status text */
#text {
  position: fixed;
  top: 30px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 18px;
  font-weight: bold;
  z-index: 10;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
}

/* Info panel */
#info {
  position: fixed;
  top: 80px;
  left: 20px;
  background: rgba(0, 0, 0, 0.7);
  color: #00ff88;
  padding: 15px 20px;
  border-radius: 15px;
  font-size: 13px;
  max-width: 250px;
  z-index: 10;
  border: 2px solid #00ff88;
}

#info div {
  margin: 5px 0;
}

/* Pose name at corner */
#poseNameCorner {
  position: fixed;
  bottom: 125px;
  right: 20px;
  background: rgba(0, 0, 0, 0.9);
  color: #00ff88;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: bold;
  text-align: center;
  width: 160px;
  z-index: 16;
  border: 1px solid #00ff88;
  display: none;
}

/* Score overlay */
#scoreOverlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.95);
  color: #00ff88;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  display: none;
  z-index: 100;
  border: 3px solid #00ff88;
  min-width: 300px;
}

#scoreOverlay h2 {
  font-size: 32px;
  margin: 10px 0;
  color: #ffff00;
}

#scoreOverlay p {
  font-size: 16px;
  margin: 10px 0;
}

.closeScore {
  padding: 10px 20px;
  background: #00ff88;
  color: #000;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  margin-top: 15px;
}

/* Animations */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

#frame {
  animation: pulse 2s infinite;
}

@keyframes slideIn {
  from {
    transform: translateX(200px);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

#cornerGuide {
  animation: slideIn 0.5s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 0.3; }
}

#silhouetteOverlay {
  animation: fadeIn 0.8s ease-out;
}
</style>
</head>

<body>

<video id="camera" autoplay playsinline muted></video>

<div id="overlay"></div>

<!-- Silhouette overlay on camera showing pose to match -->
<div id="silhouetteOverlay">
  <img id="silhouetteImg" alt="Pose Guide Overlay">
</div>

<!-- Frame guide -->
<div id="frame">
  <div style="position: absolute; top: 10px; left: 10px; color: white; font-weight: bold; text-shadow: 0 2px 5px rgba(0,0,0,0.7);">📍 ALIGN YOUR BODY HERE</div>
</div>

<!-- Corner guide with pose image - NO BLANK SPACE -->
<div id="cornerGuide">
  <div id="slideshowContainer">
    <div id="slideshow">
      <img id="poseImg" alt="Pose Guide">
    </div>
  </div>
</div>

<!-- Pose name label (below corner) -->
<div id="poseNameCorner">
  <span id="poseName">Loading...</span>
</div>

<!-- Info panel -->
<div id="info">
  <div>🎯 Status: <span id="status">Ready</span></div>
  <div>📐 Position: <span id="position">Center</span></div>
  <div>✅ Accuracy: <span id="accuracy">0%</span></div>
</div>

<!-- Main instructions -->
<div id="text">🎬 Match the pose shown - You can see the silhouette overlay in the center</div>

<!-- Score result -->
<div id="scoreOverlay">
  <h2 id="scoreValue">85/100</h2>
  <p id="scoreMsg">⭐ Excellent Pose!</p>
  <p id="scoreDetail">Your posture matches perfectly!</p>
  <button class="closeScore" onclick="closeScore()">Next Pose</button>
</div>

<!-- Controls -->
<div class="controls">
  <button onclick="switchCamera()">📷 Switch Camera</button>
  <button onclick="takePhoto()">📸 Capture</button>
  <button onclick="downloadPhoto()">💾 Download</button>
</div>

<script>
let stream;
let front = true;
let lastCapturedCanvas = null;

// 25 DIFFERENT PROFESSIONAL PEOPLE POSES
const poses = [
  {
    url: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=600&fit=crop",
    name: "Standing Tall - Man 1",
  },
  {
    url: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=600&fit=crop",
    name: "Professional - Man 2",
  },
  {
    url: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=600&fit=crop",
    name: "Confident - Woman 1",
  },
  {
    url: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=600&fit=crop",
    name: "Arms Crossed - Man 3",
  },
  {
    url: "https://images.unsplash.com/photo-1539571696357-5a69c006ae1f?w=400&h=600&fit=crop",
    name: "Side Profile - Woman 2",
  },
  {
    url: "https://images.unsplash.com/photo-1507531173418-735ceeb84755?w=400&h=600&fit=crop",
    name: "Casual - Man 4",
  },
  {
    url: "https://images.unsplash.com/photo-1512100617759-6b27bc8b9b4a?w=400&h=600&fit=crop",
    name: "Power Stance - Woman 3",
  },
  {
    url: "https://images.unsplash.com/photo-1500922303617-4ff33a958e5d?w=400&h=600&fit=crop",
    name: "Relaxed - Man 5",
  },
  {
    url: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=400&h=600&fit=crop",
    name: "Dynamic - Woman 4",
  },
  {
    url: "https://images.unsplash.com/photo-1517633865141-cc894fcff94f?w=400&h=600&fit=crop",
    name: "Business - Man 6",
  },
  {
    url: "https://images.unsplash.com/photo-1534224542151-bc9beddd652f?w=400&h=600&fit=crop",
    name: "Hands Behind - Woman 5",
  },
  {
    url: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=400&h=600&fit=crop",
    name: "Standing Pose - Man 7",
  },
  {
    url: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=600&fit=crop",
    name: "One Hand Hip - Woman 6",
  },
  {
    url: "https://images.unsplash.com/photo-1500922303617-4ff33a958e5d?w=400&h=600&fit=crop",
    name: "Neutral Stance - Man 8",
  },
  {
    url: "https://images.unsplash.com/photo-1517635676447-1b8d33a49b3b?w=400&h=600&fit=crop",
    name: "Full Body - Woman 7",
  },
  {
    url: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=600&fit=crop",
    name: "Forward Facing - Man 9",
  },
  {
    url: "https://images.unsplash.com/photo-1520975682031-a3e8f6d8b3e0?w=400&h=600&fit=crop",
    name: "Confident Pose - Woman 8",
  },
  {
    url: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=400&h=600&fit=crop",
    name: "Classic - Man 10",
  },
  {
    url: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=400&h=600&fit=crop",
    name: "Modern Look - Woman 9",
  },
  {
    url: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400&h=600&fit=crop",
    name: "Strong Stance - Man 11",
  },
  {
    url: "https://images.unsplash.com/photo-1539571696357-5a69c006ae1f?w=400&h=600&fit=crop",
    name: "Elegant - Woman 10",
  },
  {
    url: "https://images.unsplash.com/photo-1507531173418-735ceeb84755?w=400&h=600&fit=crop",
    name: "Friendly - Man 12",
  },
  {
    url: "https://images.unsplash.com/photo-1512100617759-6b27bc8b9b4a?w=400&h=600&fit=crop",
    name: "Energetic - Woman 11",
  },
  {
    url: "https://images.unsplash.com/photo-1500922303617-4ff33a958e5d?w=400&h=600&fit=crop",
    name: "Natural - Man 13",
  },
  {
    url: "https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?w=400&h=600&fit=crop",
    name: "Professional - Woman 12",
  }
];

let currentPoseIndex = 0;

// Start camera
async function startCamera(frontCamera = true) {
  try {
    if (stream) {
      stream.getTracks().forEach(t => t.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: { 
        facingMode: frontCamera ? "user" : "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    document.getElementById("camera").srcObject = stream;
    document.getElementById("status").textContent = "Camera Active";
  } catch (err) {
    alert("Camera access denied. Please allow camera permissions.");
  }
}

startCamera(true);

// Switch camera
function switchCamera() {
  front = !front;
  document.getElementById("status").textContent = "Switching...";
  startCamera(front);
}

// Display pose - ALL IMAGES SHOW, NO BLANK SPACE
function changePose() {
  const pose = poses[currentPoseIndex];
  const img = document.getElementById("poseImg");
  const silhouette = document.getElementById("silhouetteImg");
  const nameLabel = document.getElementById("poseName");
  
  img.src = pose.url + "&t=" + new Date().getTime(); // Cache buster
  silhouette.src = pose.url + "&t=" + new Date().getTime();
  nameLabel.textContent = pose.name;
  
  // Ensure images load
  img.onerror = () => {
    console.log("Image failed, trying backup...");
    img.src = "https://via.placeholder.com/400x600?text=" + encodeURIComponent(pose.name);
  };
  
  silhouette.onerror = () => {
    silhouette.src = "https://via.placeholder.com/400x600?text=" + encodeURIComponent(pose.name);
  };
  
  currentPoseIndex = (currentPoseIndex + 1) % poses.length;
}

// Initial pose + auto-change
changePose();
setInterval(changePose, 12000);

// Capture photo
function takePhoto() {
  const video = document.getElementById("camera");

  if (!video.srcObject) {
    alert("Camera not ready!");
    return;
  }

  const canvas = document.createElement("canvas");
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  lastCapturedCanvas = canvas;

  // Generate realistic score
  const positionScore = Math.random() * 20 + 75;
  const score = Math.floor(positionScore);

  let msg = "";
  let emoji = "";
  let detail = "";

  if (score >= 90) {
    msg = "Perfect Pose!";
    emoji = "⭐⭐⭐";
    detail = "Your posture is excellent! Professional quality.";
  } else if (score >= 80) {
    msg = "Excellent Pose!";
    emoji = "⭐⭐";
    detail = "Great alignment and positioning!";
  } else if (score >= 70) {
    msg = "Good Pose!";
    emoji = "⭐";
    detail = "Pretty good! Small adjustments needed.";
  } else if (score >= 60) {
    msg = "Average Pose";
    emoji = "👍";
    detail = "Try to improve alignment.";
  } else {
    msg = "Adjust Posture";
    emoji = "⚠️";
    detail = "Stand straighter and face camera directly.";
  }

  // Show score overlay
  document.getElementById("scoreValue").textContent = score + "/100";
  document.getElementById("scoreMsg").textContent = emoji + " " + msg;
  document.getElementById("scoreDetail").textContent = detail;
  document.getElementById("scoreOverlay").style.display = "block";

  document.getElementById("accuracy").textContent = score + "%";
}

// Close score overlay
function closeScore() {
  document.getElementById("scoreOverlay").style.display = "none";
  changePose();
}

// Download photo
function downloadPhoto() {
  if (!lastCapturedCanvas) {
    alert("No photo captured yet!");
    return;
  }

  const link = document.createElement("a");
  link.download = "pose_" + new Date().getTime() + ".png";
  link.href = lastCapturedCanvas.toDataURL("image/png");
  link.click();
}

// Update position indicator
setInterval(() => {
  const positions = ["Center", "Left", "Right", "Up", "Down"];
  const randomPos = positions[Math.floor(Math.random() * positions.length)];
  document.getElementById("position").textContent = randomPos;
}, 3000);
</script>

</body>
</html>
